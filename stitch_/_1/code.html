<script>
        // Simple Interaction logic for quantity buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const span = this.parentElement?.querySelector('span.mx-4');
                if (span) {
                    let val = parseInt(span.innerText);
                    if (this.querySelector('span')?.innerText === 'add') {
                        span.innerText = val + 1;
                    } else if (this.querySelector('span')?.innerText === 'remove' && val > 1) {
                        span.innerText = val - 1;
                    }
                }
            });
        });

        // Sticky Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('py-2');
                header.classList.remove('h-20');
                header.classList.add('h-16');
            } else {
                header.classList.remove('py-2');
                header.classList.remove('h-16');
                header.classList.add('h-20');
            }
        });
    </script>
